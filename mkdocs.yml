site_name: SharingIsCaring
site_url: https://megha-277.github.io/SharingIsCaring/
use_directory_urls: true

theme:
  name: material
  palette: 
    - scheme: default
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - DBMS PBL Project:
      # - Project Overview: index.md
      # - MVP Goal: pbl/mvp.md
      - Database Schema: pbl/schema.md
      # - Backend System:
      #     - Overview: pbl/backend/index.md
      #     - Info: pbl/backend/info.md
      # - Frontend System:
      #     - Overview: pbl/frontend/index.md
      #     - Info: pbl/frontend/info.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg